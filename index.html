<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalia Protection</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0b1f2a;
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:80px 20px;
    background: linear-gradient(135deg,#0a3c53,#02131c);
}

.logo{
    width:200px;
    margin-bottom:20px;
}

h1{
    font-size:50px;
    margin:10px 0;
    letter-spacing:1px;
}

.subtitle{
    color:#0079c2;
    font-size:20px;
}

/* BOTONES */
.buttons{
    margin-top:30px;
}

.btn{
    display:inline-block;
    padding:16px 28px;
    margin:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.btn-primary{
    background:#0079c2;
    color:white;
}

.btn-secondary{
    border:2px solid #0079c2;
    color:#0079c2;
}

/* SECCIONES */
.section{
    padding:60px 20px;
    text-align:center;
    background:#f5f5f5;
    color:#333;
}

/* FORMULARIOS */
.form-box{
    max-width:450px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.form-box input,
.form-box select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

.form-box button{
    width:100%;
    padding:16px;
    background:#0a3c53;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:bold;
    font-size:16px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <img src="Positivo7.png" class="logo">

    <h1>Vitalia Protection</h1>
    <p class="subtitle">Socio comercial de Seguros Monterrey</p>

    <div class="buttons">
        <a href="#reclutamiento" class="btn btn-primary">Quiero ser agente</a>
        <a href="#clientes" class="btn btn-secondary">Quiero cotizar seguro</a>
    </div>

</div>

<!-- RECLUTAMIENTO -->
<div id="reclutamiento" class="section">
    <h2>Desarrolla tu carrera como agente</h2>

    <div class="form-box">
        <form action="https://script.google.com/macros/s/AKfycbz-2aIf6W6_3--LWldXN0azPs3j5NpR4smN16qfjVLBrdk8guFI2dxlVq1Qf2K7oiPnmQ/exec" method="POST">

            <input type="hidden" name="tipo" value="Agente">

            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>
            <input type="email" name="email" placeholder="Correo electrónico">

            <input type="number" name="edad" placeholder="Edad">
            <input type="number" name="ingresos" placeholder="Ingreso mensual">

            <select name="ocupacion">
                <option value="">Ocupación actual</option>
                <option>Empleado</option>
                <option>Independiente</option>
                <option>Ventas</option>
				<option>Desempleado</option>
                <option>Otro</option>
            </select>

            <select name="ventas">
                <option value="">¿Has vendido antes?</option>
                <option>Sí</option>
                <option>No</option>
            </select>

            <button type="submit">Quiero información</button>

        </form>
    </div>
</div>

<!-- CLIENTES -->
<div id="clientes" class="section">
    <h2>Protege tu patrimonio</h2>

    <div class="form-box">
        <form action="https://script.google.com/macros/s/AKfycbz-2aIf6W6_3--LWldXN0azPs3j5NpR4smN16qfjVLBrdk8guFI2dxlVq1Qf2K7oiPnmQ/exec" method="POST">

            <input type="hidden" name="tipo" value="Cliente">

            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>
            <input type="email" name="email" placeholder="Correo electrónico">

            <input type="number" name="edad" placeholder="Edad">
            <input type="number" name="ingresos" placeholder="Ingreso mensual">

            <select name="interes">
                <option value="">¿Qué te interesa?</option>
                <option>Seguro de vida</option>
                <option>Ahorro / retiro</option>
                <option>Gastos médicos</option>
            </select>

            <button type="submit">Solicitar asesoría</button>

        </form>
    </div>
</div>

</body>
</html>
