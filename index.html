<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalia Protection</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#07162b,#0b1f3a);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:40px 20px;
}

h1{
    font-size:42px;
}

.subtitle{
    color:#00c46a;
}

.buttons{
    margin-top:20px;
}

.btn{
    display:inline-block;
    padding:14px 20px;
    margin:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.btn-primary{
    background:#00c46a;
    color:white;
}

.btn-secondary{
    border:2px solid #00c46a;
    color:#00c46a;
}

/* SECCIONES */
.section{
    padding:50px 20px;
    text-align:center;
}

/* FORMULARIOS */
.form-box{
    max-width:400px;
    margin:auto;
    background:white;
    color:#111;
    padding:25px;
    border-radius:10px;
}

.form-box input,
.form-box select{
    width:100%;
    padding:12px;
    margin:10px 0;
}

.form-box button{
    width:100%;
    padding:14px;
    background:#00c46a;
    color:white;
    border:none;
    font-weight:bold;
}
</style>

<script>
async function enviarFormulario(e, tipo){
  e.preventDefault();

  const form = e.target;

  const data = {
    nombre: form.nombre.value,
    telefono: form.telefono.value,
    email: form.email.value,
    edad: form.edad.value,
    ingresos: form.ingresos.value,
    ocupacion: form.ocupacion ? form.ocupacion.value : "",
    ventas: form.ventas ? form.ventas.value : "",
    tipo: tipo
  };

  await fetch("AQUI_PEGAS_TU_URL_DE_APPS_SCRIPT", {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Gracias, te contactamos en breve");

  window.location.href = "https://wa.me/527221939613";
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Vitalia Protection</h1>
    <p class="subtitle">Distribuidor autorizado de Seguros Monterrey</p>

    <div class="buttons">
        <a href="#reclutamiento" class="btn btn-primary">Quiero ser agente</a>
        <a href="#clientes" class="btn btn-secondary">Quiero cotizar seguro</a>
    </div>
</div>

<!-- RECLUTAMIENTO -->
<div id="reclutamiento" class="section">
    <h2>Genera ingresos sin límite</h2>

    <div class="form-box">
        <form onsubmit="enviarFormulario(event, 'Agente')">

            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>
            <input type="email" name="email" placeholder="Correo electrónico" required>

            <input type="number" name="edad" placeholder="Edad" required>
            <input type="number" name="ingresos" placeholder="Ingreso mensual">

            <select name="ocupacion">
                <option value="">Ocupación actual</option>
                <option>Empleado</option>
                <option>Independiente</option>
                <option>Ventas</option>
                <option>Otro</option>
            </select>

            <select name="ventas">
                <option value="">¿Has vendido antes?</option>
                <option>Sí</option>
                <option>No</option>
            </select>

            <button type="submit">Quiero información</button>

        </form>
    </div>
</div>

<!-- CLIENTES -->
<div id="clientes" class="section">
    <h2>Protege tu futuro hoy</h2>

    <div class="form-box">
        <form onsubmit="enviarFormulario(event, 'Cliente')">

            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>
            <input type="email" name="email" placeholder="Correo electrónico">

            <input type="number" name="edad" placeholder="Edad">
            <input type="number" name="ingresos" placeholder="Ingreso mensual">

            <select name="interes">
                <option value="">¿Qué te interesa?</option>
                <option>Seguro de vida</option>
                <option>Ahorro / retiro</option>
                <option>Gastos médicos</option>
            </select>

            <button type="submit">Solicitar asesoría</button>

        </form>
    </div>
</div>

</body>
</html>
