<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitalia Protection</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0b1f2a;
    color:white;
}

.header{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(135deg,#0a3c53,#02131c);
}

.logo-box{
    background:white;
    display:inline-block;
    padding:15px 25px;
    border-radius:12px;
    margin-bottom:20px;
}

.logo{width:180px;}

h1{font-size:48px;}
.subtitle{color:#0079c2;}

.section{
    padding:60px 20px;
    text-align:center;
    background:#f5f5f5;
    color:#333;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:1000px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
}

.form-box{
    max-width:450px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
}

.form-box input,
.form-box select{
    width:100%;
    padding:14px;
    margin:10px 0;
}

.form-box button{
    width:100%;
    padding:16px;
    background:#0a3c53;
    color:white;
    border:none;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    color:#333;
    padding:30px;
    border-radius:12px;
    text-align:center;
}

.modal button{
    margin-top:15px;
    padding:10px 20px;
    background:#0079c2;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-box">
        <img src="Positivo7.png" class="logo">
    </div>

    <h1>Vitalia Protection</h1>
    <p class="subtitle">Socio comercial de Seguros Monterrey</p>
</div>

<!-- FORM AGENTE -->
<div class="section">
<h2>Únete como agente</h2>

<div class="form-box">
<form onsubmit="enviarFormulario(event,'Agente')">

<input type="hidden" name="TipoLead" value="Agente">
<input type="hidden" name="Interes" value="">

<input type="text" name="Nombre" placeholder="Nombre completo" required>
<input type="tel" name="Teléfono" placeholder="Teléfono" required>
<input type="email" name="Email" placeholder="Correo electrónico">

<input type="number" name="Edad" placeholder="Edad">
<input type="number" name="Ingresos" placeholder="Ingreso mensual">

<select name="Ocupación">
<option value="">Ocupación actual</option>
<option>Empleado</option>
<option>Independiente</option>
<option>Ventas</option>
<option>Desempleado</option>
<option>Otro</option>
</select>

<select name="ExperienciaVentas">
<option value="">¿Has vendido antes?</option>
<option>Sí</option>
<option>No</option>
</select>

<button type="submit">Quiero información</button>

</form>
</div>
</div>

<!-- FORM CLIENTE -->
<div class="section">
<h2>Solicita asesoría</h2>

<div class="form-box">
<form onsubmit="enviarFormulario(event,'Cliente')">

<input type="hidden" name="TipoLead" value="Cliente">

<input type="text" name="Nombre" placeholder="Nombre completo" required>
<input type="tel" name="Teléfono" placeholder="Teléfono" required>
<input type="email" name="Email" placeholder="Correo electrónico">

<input type="number" name="Edad" placeholder="Edad">
<input type="number" name="Ingresos" placeholder="Ingreso mensual">

<select name="Interes">
<option value="">¿Qué te interesa?</option>
<option>Seguro de vida</option>
<option>Ahorro / retiro</option>
<option>Gastos médicos</option>
</select>

<!-- Campos que el sheet espera -->
<input type="hidden" name="Ocupación" value="">
<input type="hidden" name="ExperienciaVentas" value="">

<button type="submit">Solicitar asesoría</button>

</form>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Gracias</h3>
<p id="mensaje"></p>
<button onclick="cerrarModal()">Cerrar</button>
</div>
</div>

<script>
async function enviarFormulario(e,tipo){
e.preventDefault();

const form = e.target;
const data = new FormData(form);

try{
const res = await fetch("https://script.google.com/macros/s/AKfycbylfhv8GoykjeR2YI5bZ895jVcNQAG2GTPunI2AXqIVkiwCEb4545nswv09UYTvZGmJ4g/exec",{
method:"POST",
body:data
});

const txt = await res.text();

if(txt.includes("OK")){
document.getElementById("modal").style.display="flex";

if(tipo==="Agente"){
document.getElementById("mensaje").innerText=
"Recibimos tu información. Te contactaremos para iniciar tu proceso como agente.";
}else{
document.getElementById("mensaje").innerText=
"Gracias por tu interés. Un asesor se comunicará contigo.";
}

form.reset();
}else{
alert("Error al enviar");
}

}catch(err){
alert("Error de conexión");
}
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
